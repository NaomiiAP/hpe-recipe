name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      working-directory: ./backend
      run: mvn clean package
      
    - name: Build Docker image
      run: docker build -t hpe-recipe-detection:${{ github.sha }} .
      
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        
    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build
      
    - name: Lint Helm Chart
      uses: azure/setup-helm@v3
      with:
        version: v3.12.0
    - run: helm lint ./helm/recipe-detection-chart
